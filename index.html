      const early = new Set(), late = new Set();
      employees.forEach(e => {
        [e.mostEarly, ...e.otherEarly].forEach(t => early.add(t));
        [e.mostLate, ...e.otherLate].forEach(t => late.add(t));
      });
      const sortTime = t => {
        const [time, period] = t.split(" ");
        const [h, m] = time.split(":").map(Number);
        return (period === "PM" ? 12 : 0) + h * 60 + m;
      };
      return {
        early: [...early].sort((a,b) => sortTime(a)-sortTime(b)),
        late:  [...late].sort((a,b)  => sortTime(a)-sortTime(b)),
      };
    }

    function matchesTime(emp, time, shiftType) {
      if (shiftType === NIGHT) return emp.night !== "NO";
      if (shiftType === "early") return [emp.mostEarly, ...emp.otherEarly].includes(time);
      if (shiftType === "late")  return [emp.mostLate,  ...emp.otherLate].includes(time);
      return false;
    }

    function isMostPreferred(emp, time, shiftType) {
      if (shiftType === "early") return emp.mostEarly === time;
      if (shiftType === "late")  return emp.mostLate  === time;
      return false;
    }

    function nightBadge(pref) {
      if (pref === "YES")   return { label:"Yes",   color:"#22c55e" };
      if (pref === "NO")    return { label:"No",    color:"#ef4444" };
      return                       { label:"Maybe", color:"#f59e0b" };
    }

    function App() {
      const [step, setStep]             = useState(0);
      const [myUnit, setMyUnit]         = useState(null);
      const [targetUnit, setTargetUnit] = useState(null);
      const [shiftType, setShiftType]   = useState(null);
      const [currentTime, setCurrentTime] = useState(null);

      const { early: earlyTimes, late: lateTimes } = useMemo(getAllShiftTimes, []);

      const results = useMemo(() => {
        if (step < 4) return [];
        return employees
          .filter(e => e.unit === targetUnit && matchesTime(e, currentTime, shiftType))
          .sort((a,b) => isMostPreferred(b, currentTime, shiftType) - isMostPreferred(a, currentTime, shiftType));
      }, [step, targetUnit, currentTime, shiftType]);

      const reset = () => { setStep(0); setMyUnit(null); setTargetUnit(null); setShiftType(null); setCurrentTime(null); };
      const back  = () => setStep(s => Math.max(0, s-1));

      const s = {
        wrap:    { minHeight:"100vh", background:"linear-gradient(135deg,#1e3a5f 0%,#16213e 100%)", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", fontFamily:"'Segoe UI',sans-serif" },
        card:    { background:"#fff", borderRadius:16, padding:"32px 28px", width:"100%", maxWidth:480, boxShadow:"0 8px 40px rgba(0,0,0,0.25)" },
        logo:    { display:"flex", alignItems:"center", gap:10, marginBottom:24 },
        logoIcon:{ width:38, height:38, background:"linear-gradient(135deg,#2563eb,#7c3aed)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 },
        logoText:{ fontWeight:700, fontSize:18, color:"#1e3a5f" },
        title:   { fontSize:20, fontWeight:700, color:"#1e3a5f", marginBottom:6 },
        sub:     { fontSize:14, color:"#64748b", marginBottom:22 },
        progress:{ display:"flex", gap:6, marginBottom:28 },
        dot: (active,done) => ({ flex:1, height:4, borderRadius:4, background: done?"#2563eb": active?"#93c5fd":"#e2e8f0", transition:"background 0.3s" }),
        btnRow:  { display:"flex", flexWrap:"wrap", gap:10 },
        unitBtn: sel => ({ flex:"1 1 calc(33% - 10px)", padding:"12px 8px", borderRadius:10, border:`2px solid ${sel?"#2563eb":"#e2e8f0"}`, background:sel?"#eff6ff":"#f8fafc", color:sel?"#1d4ed8":"#374151", fontWeight:600, fontSize:14, cursor:"pointer" }),
        shiftBtn:(sel,color) => ({ flex:"1 1 calc(33% - 10px)", padding:"14px 8px", borderRadius:10, border:`2px solid ${sel?color:"#e2e8f0"}`, background:sel?color+"18":"#f8fafc", color:sel?color:"#374151", fontWeight:600, fontSize:13, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }),
        timeBtn: sel => ({ flex:"1 1 calc(25% - 8px)", padding:"10px 4px", borderRadius:8, border:`2px solid ${sel?"#2563eb":"#e2e8f0"}`, background:sel?"#eff6ff":"#f8fafc", color:sel?"#1d4ed8":"#374151", fontWeight:600, fontSize:12, cursor:"pointer" }),
        nextBtn: { width:"100%", marginTop:20, padding:"13px", borderRadius:10, background:"linear-gradient(135deg,#2563eb,#7c3aed)", color:"#fff", fontWeight:700, fontSize:15, border:"none", cursor:"pointer" },
        backBtn: { background:"none", border:"none", color:"#64748b", fontWeight:600, fontSize:13, cursor:"pointer", marginBottom:16, display:"flex", alignItems:"center", gap:4 },
        empCard: most => ({ background:most?"#eff6ff":"#f8fafc", border:`1.5px solid ${most?"#93c5fd":"#e2e8f0"}`, borderRadius:12, padding:"14px 16px", marginBottom:10, position:"relative" }),
        badge:   color => ({ display:"inline-block", padding:"2px 8px", borderRadius:20, background:color+"22", color, fontSize:11, fontWeight:700 }),
        mostTag: { position:"absolute", top:10, right:12, background:"#dbeafe", color:"#1d4ed8", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20 },
        empty:   { textAlign:"center", padding:"30px 0", color:"#94a3b8" },
      };

      const dots = [0,1,2,3].map(i => <div key={i} style={s.dot(step===i, step>i)} />);

      return (
        <div style={s.wrap}>
          <div style={s.card}>
            <div style={s.logo}>
              <div style={s.logoIcon}>🔄</div>
              <div style={s.logoText}>Shift Swap Finder</div>
            </div>
            <div style={s.progress}>{dots}</div>

            {step > 0 && <button style={s.backBtn} onClick={back}>← Back</button>}

            {/* Step 0 – My Unit */}
            {step === 0 && <>
              <div style={s.title}>Which unit are you in?</div>
              <div style={s.sub}>Select your unit to get started.</div>
              <div style={s.btnRow}>
                {units.map(u => <button key={u} style={s.unitBtn(myUnit===u)} onClick={() => setMyUnit(u)}>{u}</button>)}
              </div>
              <button style={{...s.nextBtn, opacity:myUnit?1:0.4}} disabled={!myUnit} onClick={() => setStep(1)}>Next →</button>
            </>}

            {/* Step 1 – Target Unit */}
            {step === 1 && <>
              <div style={s.title}>Which unit to swap with?</div>
              <div style={s.sub}>Select the unit you want to find a swap partner in.</div>
              <div style={s.btnRow}>
                {units.map(u => <button key={u} style={s.unitBtn(targetUnit===u)} onClick={() => setTargetUnit(u)}>{u}</button>)}
              </div>
              <button style={{...s.nextBtn, opacity:targetUnit?1:0.4}} disabled={!targetUnit} onClick={() => setStep(2)}>Next →</button>
            </>}

            {/* Step 2 – Shift Type */}
            {step === 2 && <>
              <div style={s.title}>What type of shift do you have?</div>
              <div style={s.sub}>Choose your current shift category.</div>
              <div style={s.btnRow}>
                {[["early","🌅","Early Shift","#f59e0b"],["late","🌇","Late Shift","#2563eb"],[NIGHT,"🌙","Night Shift","#7c3aed"]].map(([val,icon,label,color]) =>
                  <button key={val} style={s.shiftBtn(shiftType===val, color)} onClick={() => { setShiftType(val); setCurrentTime(null); }}>
                    <span style={{fontSize:22}}>{icon}</span><span>{label}</span>
                  </button>
                )}
              </div>
              <button style={{...s.nextBtn, opacity:shiftType?1:0.4}} disabled={!shiftType} onClick={() => setStep(shiftType===NIGHT?4:3)}>Next →</button>
            </>}

            {/* Step 3 – Current Time */}
            {step === 3 && <>
              <div style={s.title}>What is your current start time?</div>
              <div style={s.sub}>Select the start time of your current shift.</div>
              <div style={s.btnRow}>
                {(shiftType==="early"?earlyTimes:lateTimes).map(t =>
                  <button key={t} style={s.timeBtn(currentTime===t)} onClick={() => setCurrentTime(t)}>{t}</button>
                )}
              </div>
              <button style={{...s.nextBtn, opacity:currentTime?1:0.4}} disabled={!currentTime} onClick={() => setStep(4)}>Find Matches →</button>
            </>}

            {/* Step 4 – Results */}
            {step === 4 && <>
              <div style={s.title}>Potential Swap Partners</div>
              <div style={s.sub}>
                {shiftType===NIGHT
                  ? <span>Employees in <b>{targetUnit}</b> open to night shifts</span>
                  : <span>Employees in <b>{targetUnit}</b> who prefer <b>{currentTime}</b> ({shiftType} shift)</span>}
              </div>
              {results.length === 0
                ? <div style={s.empty}><div style={{fontSize:36}}>😔</div><div style={{marginTop:8}}>No matches found in {targetUnit}.</div></div>
                : results.map(emp => {
                    const most = shiftType!==NIGHT && isMostPreferred(emp, currentTime, shiftType);
                    const nb   = nightBadge(emp.night);
                    return (
                      <div key={emp.id} style={s.empCard(most)}>
                        {most && <div style={s.mostTag}>⭐ Most Preferred</div>}
                        <div style={{fontWeight:700, fontSize:15, color:"#1e3a5f", marginBottom:2}}>{emp.name}</div>
                        <div style={{fontSize:12, color:"#64748b", marginBottom:8}}>ID: {emp.id} · {emp.unit}</div>
                        {shiftType!==NIGHT && <>
                          <div style={{fontSize:12, color:"#374151", marginBottom:3}}>
                            <span style={{color:"#64748b"}}>🌅 Early:</span> <b>{emp.mostEarly}</b> <span style={{color:"#94a3b8"}}>+ {emp.otherEarly.join(", ")}</span>
                          </div>
                          <div style={{fontSize:12, color:"#374151", marginBottom:6}}>
                            <span style={{color:"#64748b"}}>🌇 Late:</span> <b>{emp.mostLate}</b> <span style={{color:"#94a3b8"}}>+ {emp.otherLate.join(", ")}</span>
                          </div>
                        </>}
                        <div style={{fontSize:12}}>🌙 Night: <span style={s.badge(nb.color)}>{nb.label}</span></div>
                      </div>
                    );
                  })
              }
              <button style={{...s.nextBtn, marginTop:16, background:"#f1f5f9", color:"#1e3a5f"}} onClick={reset}>🔄 Start Over</button>
            </>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
